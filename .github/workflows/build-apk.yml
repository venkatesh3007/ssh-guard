name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build web app
      run: npm run build
      
    - name: Add Android platform (if missing)
      run: |
        if [ ! -d android ]; then
          npx cap add android
        else
          echo "Android platform already present, skipping add"
        fi
      
    - name: Sync Capacitor
      run: npx cap sync android
      
    - name: Grant execute permission for gradlew
      run: chmod +x ./android/gradlew
      
    - name: Build Android APK
      run: cd android && ./gradlew assembleDebug
      
    - name: Rename APK
      run: mv android/app/build/outputs/apk/debug/app-debug.apk stucred-football-game.apk
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: stucred-football-game.apk
        generate_release_notes: true
        draft: false
        prerelease: false
